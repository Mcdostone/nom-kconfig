name: Publish

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: "-D warnings"
  RUSTDOCFLAGS: '--deny warnings'
  MINIMUM_SUPPORTED_RUST_VERSION: 1.80.1
  DOCKER_REGISTRY: ghcr.io
  RUST_CHANNEL: stable

on:
  workflow_dispatch:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_call:

jobs:
  version:
    name: Determine version to publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install Rust
        run: |
          rustup update --no-self-update ${RUST_CHANNEL}
          rustup component add --toolchain ${RUST_CHANNEL} cargo
          rustup default ${RUST_CHANNEL}
        env:
          RUST_CHANNEL: ${{ env.RUST_CHANNEL }}
      - id: release
        run: echo "version=$(cargo pkgid | cut -d '#' -f2)" >> "$GITHUB_OUTPUT"

  create-release:
    runs-on: ubuntu-latest
    name: Create release
    needs: version
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          persist-credentials: false
      - name: Create github release
        run: gh release create "v${VERSION}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.version.outputs.version }}

  changelog:
    needs: [version, create-release]
    uses: ./.github/workflows/changelog.yml
    name: Create changelog
    secrets: inherit
    permissions:
      contents: write
      pull-requests: write
      id-token: write

  publish-to-registry:
    runs-on: ubuntu-latest
    name: Publish to registry
    needs: [create-release]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      attestations: write
      id-token: write
      artifact-metadata: write
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install Rust
        run: |
          rustup update --no-self-update ${RUST_CHANNEL}
          rustup component add --toolchain ${RUST_CHANNEL} cargo
          rustup default ${RUST_CHANNEL}
        env:
          RUST_CHANNEL: ${{ env.RUST_CHANNEL }}
      
      - run: cargo install --locked cargo-cyclonedx
      - name: Generate SBOM
        run:  cargo cyclonedx --all --all-features --override-filename sbom --format json
      
      - uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-name: '${{ github.workspace }}/nom-kconfig-${VERSION}'
          subject-path: '${{ github.workspace }}/Cargo.lock'
          sbom-path: '${{ github.workspace }}/sbom.json'
        env:
          VERSION: ${{ needs.version.outputs.version }}
      
      - uses: rust-lang/crates-io-auth-action@b7e9a28eded4986ec6b1fa40eeee8f8f165559ec
        id: auth
      - run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev
      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

